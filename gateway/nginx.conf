events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    sendfile on;
    tcp_nopush on;

    # Docker embedded DNS — lazy resolve, gateway переживает отсутствующие апстримы.
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format gw '[$time_local] $remote_addr "$request" -> $upstream_addr '
                  'status=$status bytes=$body_bytes_sent rt=$request_time req_id=$request_id';

    server {
        listen 80 default_server;
        server_name _;
        access_log /var/log/nginx/access.log gw;
        client_max_body_size 50m;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;

        # --- auth (root_path=/auth) ---
        location ^~ /auth/ {
            set $upstream_auth auth-api:80;
            rewrite ^/auth/(.*)$ /$1 break;
            proxy_pass http://$upstream_auth;
        }

        # --- notifications API (root_path=/notify) ---
        location ^~ /notify/ {
            set $upstream_notify notify-api:8001;
            rewrite ^/notify/(.*)$ /$1 break;
            proxy_pass http://$upstream_notify;
        }

        # --- /admin/movies/* и /admin/notifications/* — две Django-админки ---
        # Django каждой админки имеет FORCE_SCRIPT_NAME с этим же префиксом,
        # поэтому путь передаётся как есть (без rewrite) — Django сам срежет prefix.

        # Статика — отдаём сами nginx'ом из named volume (zero-copy sendfile)
        location ^~ /admin/movies/static/ {
            alias /opt/admin/movies/static/;
            access_log off;
            expires 7d;
        }
        location ^~ /admin/movies/media/ {
            alias /opt/admin/movies/media/;
            access_log off;
            expires 7d;
        }
        location ^~ /admin/movies/ {
            set $upstream_movies_admin movies-admin:8000;
            rewrite ^/admin/movies/(.*)$ /$1 break;
            proxy_pass http://$upstream_movies_admin;
        }

        location ^~ /admin/notifications/static/ {
            alias /opt/admin/notifications/static/;
            access_log off;
            expires 7d;
        }
        location ^~ /admin/notifications/media/ {
            alias /opt/admin/notifications/media/;
            access_log off;
            expires 7d;
        }
        location ^~ /admin/notifications/ {
            set $upstream_notifications_admin django-admin:8000;
            rewrite ^/admin/notifications/(.*)$ /$1 break;
            proxy_pass http://$upstream_notifications_admin;
        }

        # --- content-api (root_path=/content) ---
        location ^~ /content/ {
            set $upstream_content movies-api:8000;
            rewrite ^/content/(.*)$ /$1 break;
            proxy_pass http://$upstream_content;
        }

        # --- ugc-content ---
        location ^~ /ugc/ {
            set $upstream_ugc ugc-content-api:8000;
            rewrite ^/ugc/(.*)$ /$1 break;
            proxy_pass http://$upstream_ugc;
        }

        # --- ugc-events ---
        location ^~ /ugc-events/ {
            set $upstream_ugc_events ugc-api:8000;
            rewrite ^/ugc-events/(.*)$ /$1 break;
            proxy_pass http://$upstream_ugc_events;
        }

        # --- billing-api ---
        location ^~ /billing/ {
            set $upstream_billing billing-api:8001;
            rewrite ^/billing/(.*)$ /$1 break;
            proxy_pass http://$upstream_billing;
        }

        # --- MinIO public objects (posters etc.) ---
        location ^~ /media/ {
            set $upstream_minio minio:9000;
            rewrite ^/media/(.*)$ /$1 break;
            proxy_pass http://$upstream_minio;
            expires 30d;
            access_log off;
        }

        # --- landing ---
        location = / {
            default_type text/plain;
            return 200 'cinema gateway\n\nroutes:\n  /auth/                 -> auth-api\n  /notify/               -> notify-api\n  /admin/movies/         -> movies-admin (Django content)\n  /admin/notifications/  -> notifications Django admin\n  /content/              -> content-api\n  /ugc/                  -> ugc-content\n  /ugc-events/           -> ugc-events\n  /billing/              -> billing-api\n';
        }
    }
}
