version: "3"

name: auth

services:
  auth-api:
    build:
      context: ./src
      args:
        - COMMAND=debug
    container_name: auth-api
    restart: always
    env_file:
      - .env
    environment:
      - AUTH_JAEGER_HOST=jaeger
      - AUTH_JAEGER_PORT=6831
      - AUTH_POSTGRES_HOST=auth-postgres
      - AUTH_POSTGRES_PORT=5432
      - AUTH_POSTGRES_USER=auth
      - AUTH_POSTGRES_PASSWORD=auth
      - AUTH_POSTGRES_DB=auth
      - AUTH_REDIS_HOST=auth-redis
      - AUTH_REDIS_PORT=6379
      - AUTH_RSA_PRIVATE_PATH=/run/secrets/rsa_priv
      - AUTH_RSA_PUBLIC_PATH=/run/secrets/rsa_pub
      - AUTH_PROJECT_ROOT_URL=/auth
      - AUTH_ACCOUNTS_FILE_PATH=/run/secrets/service_accounts
      - AUTH_DEBUG=True
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-redis:
        condition: service_started
    healthcheck:
      test: curl --fail http://127.0.0.1/health || exit 1
      interval: 5s
      timeout: 30s
      retries: 5
    volumes:
      - ./src:/home/app
    secrets:
      - rsa_pub
      - rsa_priv
      - service_accounts
    ports:
      - "8002:80"
    networks:
      - default
      - cinema_net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    volumes:
      - auth_db_volume:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: auth
      POSTGRES_DB: auth
      POSTGRES_PASSWORD: auth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "auth", "-U", "auth"]
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.5'

  auth-redis:
    image: redis:7-alpine
    container_name: auth-redis
    volumes:
      - auth_redis_volume:/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.2'

volumes:
  auth_db_volume:
  auth_redis_volume:

secrets:
  rsa_pub:
    file: ./keys/rsa.pub
  rsa_priv:
    file: ./keys/rsa.private
  service_accounts:
    file: ./keys/services.json

networks:
  default: {}
  cinema_net:
    external: true
